<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha Naval</title>
    <link rel="stylesheet" href="Navalidades.css">
</head>

<body>
    <div id="cabecalho">
        <h1>Batalha Naval!</h1>
    </div>

    <div id="menu_inicial">
        <h2>Escolha o Modo de Jogo:</h2>
        <div class="botoes_container">
            <button onclick="escolherModo('padrao')">Jogar Solo</button>
            <button onclick="escolherModo('cpu')">Jogar contra CPU</button>
        </div>
    </div>

    <div id="placar_padrao" style="display: none;">
        <div>Pontuação: <span id="pontos-player-solo">0</span></div>
    </div>
    
    <div id="placar_com_cpu" style="display: none;">
        <div>Seus Pontos: <span id="pontos-player">0</span></div>
        <div>Pontos CPU: <span id="pontos-cpu">0</span></div>
    </div>
    
    <div id="status_solo" style="display: none;">
        Vidas: <span id="vidas_contador">10</span>
    </div>

    <div id="tela_fim_jogo" style="display: none;">
        <h1 id="mensagem_fim"></h1>
        <p id="detalhes_fim"></p>
        <button id="btn_reiniciar" onclick="reiniciarJogo()">Jogar Novamente</button>
    </div>

    <div id="tabuleiro_bem_bolado" style="display: none;"></div>

    <div id="controles_partida" style="display: none; margin-top: 20px;">
        <button onclick="voltarAoMenu()" style="background-color: #f44336; color: white; border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer;">Voltar ao Menu</button>
    </div>

    <script src="Javascript/NavalidadesCPU.js"></script>
    <script src="Javascript/Placar_mal_bolado.js"></script>
    <script src="Javascript/Navalidades.js"></script>

    <script>
        function escolherModo(modo) {
            document.getElementById("menu_inicial").style.display = "none";
            
            let tabuleiro = document.getElementById("tabuleiro_bem_bolado");
            tabuleiro.style.display = "grid";
            
            // Mostra o botão de voltar ao menu durante a partida
            document.getElementById("controles_partida").style.display = "block";
            
            zerarPlacar();

            if (modo === "padrao") {
                document.getElementById("placar_padrao").style.display = "flex";
                BatalhaNaval();
            } else if (modo === "cpu") {
                document.getElementById("placar_com_cpu").style.display = "flex";
                BatalhaNavalCPU();
            }
        }

        function voltarAoMenu() {
            document.getElementById("menu_inicial").style.display = "flex";
            document.getElementById("tabuleiro_bem_bolado").style.display = "none";
            document.getElementById("controles_partida").style.display = "none";
            document.getElementById("tela_fim_jogo").style.display = "none";
            document.getElementById("placar_padrao").style.display = "none";
            document.getElementById("placar_com_cpu").style.display = "none";
            document.getElementById("status_solo").style.display = "none";
            zerarPlacar();
        }
    </script>
    </body>
</html>
