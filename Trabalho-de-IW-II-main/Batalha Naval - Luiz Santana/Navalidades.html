<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha Naval</title>
    <link rel="stylesheet" href="Navalidades.css">
</head>

<body>
    <div id="cabecalho">
        <h1>Batalha Naval!</h1>
    </div>

    <div id="menu_inicial">
        <h2>Escolha o Modo de Jogo:</h2>
        <div class="botoes_container">
            <button onclick="escolherModo('padrao')">Jogar Solo</button>
            <button onclick="escolherModo('cpu')">Jogar contra CPU</button>
        </div>
    </div>

    <div id="placar_padrao" style="display: none;">
        <div>Pontuação: <span id="pontos-player-solo">0</span></div>
    </div>
    
    <div id="placar_com_cpu" style="display: none;">
        <div>Seus Pontos: <span id="pontos-player">0</span></div>
        <div>Pontos CPU: <span id="pontos-cpu">0</span></div>
    </div>
    
    <div id="status_solo" style="display: none;">
        Vidas: <span id="vidas_contador">10</span>
    </div>

    <div id="tela_fim_jogo" style="display: none;">
        <h1 id="mensagem_fim"></h1>
        <p id="detalhes_fim"></p>
        <button id="btn_reiniciar" onclick="reiniciarJogo()">Jogar Novamente</button>
    </div>

    <div id="tabuleiro_bem_bolado" style="display: none;"></div>

    <div id="controles_partida" style="display: none; margin-top: 20px;">
        <button onclick="voltarAoMenu()" id="Resetbtn">Voltar ao Menu</button>
    </div>

    <script src="Javascript/NavalidadesCPU.js"></script>
    <script src="Javascript/Placar_mal_bolado.js"></script>
    <script src="Javascript/Navalidades.js"></script>

    <script>
function escolherModo(modo) {
// Define a função que decide o que acontece quando o jogador clica em "Jogar Solo" ou "Jogar contra CPU".
// O parâmetro "modo" recebe a string 'padrao' ou 'cpu', vinda do onclick do botão.

    document.getElementById("menu_inicial").style.display = "none";
    // Oculta a tela de menu inicial, já que o jogador acabou de escolher um modo

    let tabuleiro = document.getElementById("tabuleiro_bem_bolado");
    // Guarda numa variável a referência do elemento do tabuleiro (evita buscar duas vezes no DOM)

    tabuleiro.style.display = "grid";
    // Exibe o tabuleiro usando display "grid" (provavelmente o CSS organiza as células do jogo em grade)

    document.getElementById("controles_partida").style.display = "block";
    // Mostra o botão "Voltar ao Menu", que fica escondido enquanto não há partida em andamento

    zerarPlacar();
    // Chama uma função (definida em Placar_mal_bolado.js) que reseta os pontos para 0,
    // garantindo que uma partida nova comece zerada

    if (modo === "padrao") {
    // Verifica se o modo escolhido foi o solo

        document.getElementById("placar_padrao").style.display = "flex";
        // Exibe o placar do modo solo (usando display "flex" para alinhar os elementos)

        BatalhaNaval();
        // Chama a função principal do modo solo (definida em Navalidades.js), que provavelmente 
        // inicia o tabuleiro, posiciona os navios e começa o jogo

    } else if (modo === "cpu") {
    // Caso contrário, verifica se o modo escolhido foi contra a CPU

        document.getElementById("placar_com_cpu").style.display = "flex";
        // Exibe o placar do modo contra CPU (jogador + CPU)

        BatalhaNavalCPU();
        // Chama a função principal do modo CPU (definida em NavalidadesCPU.js), que inicia 
        // a partida contra a inteligência artificial
    }
}

function voltarAoMenu() {
// Define a função chamada quando o jogador clica em "Voltar ao Menu" durante a partida

    document.getElementById("menu_inicial").style.display = "flex";
    // Reexibe o menu inicial (usando "flex" para manter o layout correto)

    document.getElementById("tabuleiro_bem_bolado").style.display = "none";
    // Esconde o tabuleiro, já que o jogador saiu da partida

    document.getElementById("controles_partida").style.display = "none";
    // Esconde o botão "Voltar ao Menu", pois não há mais partida ativa

    document.getElementById("tela_fim_jogo").style.display = "none";
    // Garante que a tela de fim de jogo (vitória/derrota) também fique escondida,
    // caso estivesse visível antes de voltar ao menu

    document.getElementById("placar_padrao").style.display = "none";
    // Esconde o placar do modo solo

    document.getElementById("placar_com_cpu").style.display = "none";
    // Esconde o placar do modo CPU

    document.getElementById("status_solo").style.display = "none";
    // Esconde o contador de vidas do modo solo

    zerarPlacar();
    // Zera o placar novamente, garantindo que, ao iniciar uma nova partida pelo menu, 
    // os pontos comecem do zero
}
    </script>
    </body>
</html>
