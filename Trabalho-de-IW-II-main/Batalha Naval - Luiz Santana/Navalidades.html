<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batalha Naval</title>
    <link rel="stylesheet" href="Navalidades.css">
</head>

<body>
    <div id="cabecalho">
        <h1>Batalha Naval!</h1>
    </div>

    <div id="menu_inicial">
        <h2>Escolha o Modo de Jogo:</h2>
        <div class="botoes_container">
            <button onclick="escolherModo('padrao')">Jogar Solo</button>
            <button onclick="escolherModo('cpu')">Jogar contra CPU</button>
        </div>
    </div>

<div id="placar_padrão" style="display: none;">
        <div>Pontuação: <span id="pontos-player-solo">0</span></div>
</div>
<div id="placar_com_cpu" style="display: none;">
    <div>Seus Pontos: <span id="pontos-player">0</span></div>
    <div>Pontos CPU: <span id="pontos-cpu">0</span></div>
</div>

    <div id="tabuleiro_bem_bolado" style="display: none;"></div>

    <script src="Javascript/NavalidadesCPU.js"></script>
    <script src="Javascript/Placar_mal_bolado.js"></script>
    <script src="Javascript/Navalidades.js"></script>

    <script>
        function escolherModo(modo) {
            // Esconde o menu inicial
            document.getElementById("menu_inicial").style.display = "none";
            //mostra
            // Mostra o tabuleiro como GRID (isso força o CSS do tabuleiro a funcionar com as 10 colunas!)
            let tabuleiro = document.getElementById("tabuleiro_bem_bolado");
            tabuleiro.style.display = "grid";

            if (modo === "padrao") {
                //mostra a pontuação do jogo padrão como flex
            document.getElementById("placar_padrão").style.display = "flex";
                BatalhaNaval();
            } else if (modo === "cpu") {
            document.getElementById("placar_com_cpu").style.display = "flex";
                BatalhaNavalCPU();
            }
        }
    </script>
</body>
</html>
